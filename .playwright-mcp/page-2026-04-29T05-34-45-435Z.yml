  - generic [ref=e42]:
    - generic [ref=e43]:
      - generic [ref=e44]: 01 / 背景與挑戰
      - heading "背景與挑戰" [level=2] [ref=e45]
      - paragraph [ref=e46]:
        - text: Edge PQM（Production Quality Management）是台達電子智慧製造堆疊的核心應用之一，目標是讓工廠 Line Manager 在
        - emphasis [ref=e47]: 同一個畫面上即時掌握產線狀態
        - text: ——不用在三個系統之間切換，不用等班組長回報，不用憑感覺判斷哪裡出了問題。
      - paragraph [ref=e48]:
        - text: 在這個專案裡，我的職責橫跨兩個階段：初期以
        - emphasis [ref=e49]: UX Designer
        - text: 的身份重構整個資訊架構與設計系統；後期轉為
        - emphasis [ref=e50]: Product Owner
        - text: ，負責與多個內部組織對齊指標定義、釐清產品邊界、推動跨廠區導入。
      - generic [ref=e51]:
        - generic [ref=e52]: 核心挑戰
        - paragraph [ref=e53]: 資料來自 CFX 設備事件、MES 工單系統、EAP 設備資訊、Edge TMM 品質模組——四個資料源、多個組織定義的指標，要統一進一個可配置的看板，還要讓站在螢幕前 3 秒就能讀懂。
    - generic [ref=e54]:
      - img "產線生產看板全覽" [ref=e55]
      - paragraph [ref=e56]: 產線生產看板 — 15 個 widget 涵蓋稼動率、UPH、ATT、直通率與設備狀態
  - generic [ref=e58]:
    - generic [ref=e59]: 02 / 研究與洞察
    - heading "研究與洞察" [level=2] [ref=e60]
    - paragraph [ref=e61]: 我定期走訪產線，與 Line Manager、製程工程師、設備技術員對話。現場研究帶出三個關鍵洞察：
    - generic [ref=e62]:
      - generic [ref=e63]:
        - generic [ref=e64]: "01"
        - heading "角色分工，螢幕共用" [level=4] [ref=e65]
        - paragraph [ref=e66]: Line Manager 看全線稼動率與直通率；設備工程師看某台設備的 ATT / CT；品質工程師只在乎 FPY。同一個畫面必須服務三種不同視角。
      - generic [ref=e67]:
        - generic [ref=e68]: "02"
        - heading "指標定義才是痛點" [level=4] [ref=e69]
        - paragraph [ref=e70]: 「稼動率」這個詞在不同組織有不同算法。數字出現在螢幕上，沒有人知道它怎麼算出來的，結果大家不信任、不使用。
      - generic [ref=e71]:
        - generic [ref=e72]: "03"
        - heading "3 秒內讀完，或永遠不讀" [level=4] [ref=e73]
        - paragraph [ref=e74]: Line Manager 在排班確認時站在大螢幕前，視窗停留不超過 10 秒。資訊必須夠大、夠直覺，否則他們會繼續用白板和對講機。
  - generic [ref=e77]:
    - generic [ref=e78]:
      - generic [ref=e79]: 03 / 設計決策
      - heading "設計決策" [level=2] [ref=e80]
      - paragraph [ref=e81]: 基於現場研究，我做了四個關鍵的設計決策：
      - generic [ref=e82]:
        - generic [ref=e83]:
          - generic [ref=e84]: 決策 01
          - generic [ref=e85]:
            - heading "三層固定看板 + 自訂看板" [level=4] [ref=e86]
            - paragraph [ref=e87]: 依角色需求設計三個固定看板（產線生產看板 15 個 widget、指標看板 7 個 widget、設備狀態看板每台 10 個 widget），並提供自訂看板讓進階用戶自行組合。固定看板確保 Day 1 開箱即用；自訂看板確保長尾需求有出口。
        - generic [ref=e88]:
          - generic [ref=e89]: 決策 02
          - generic [ref=e90]:
            - heading "i 彈窗 — 讓每個數字可以被驗証" [level=4] [ref=e91]
            - paragraph [ref=e92]: 每個 widget 附完整的 i 彈窗，記錄指標定義、計算公式、資料來源、更新頻率，由各組織（P7、AIOT、MQA、T1 等）共同審核。這不只是 UI 設計，而是讓多個組織的共識變成可見的產品層。
        - generic [ref=e93]:
          - generic [ref=e94]: 決策 03
          - generic [ref=e95]:
            - heading "數字優先的視覺語言" [level=4] [ref=e96]
            - paragraph [ref=e97]: 關鍵指標（UPH、OEE、稼動率）用 36–48px 的大數字呈現，觸發閾值時立即變色（紅色=異常、橙色=警示）。圓環圖顯示設備狀態分布；折線圖顯示 ATT / CT 趨勢。設備狀態更新最快 10 秒一次。
        - generic [ref=e98]:
          - generic [ref=e99]: 決策 04
          - generic [ref=e100]:
            - heading "全指標 Widget 化 — 自由組合的部件中心" [level=4] [ref=e101]
            - paragraph [ref=e102]: 所有指標模組都設計為獨立 widget，透過「部件中心」讓用戶從生產分析（P）、品質分析（Q）、設備分析（M）三個類別中自由挑選、拖拉組合成專屬看板。這讓同一套資料基礎設施，能服務從 Line Manager 到製程工程師的不同使用情境，無需重複開發。
    - generic [ref=e103]:
      - generic [ref=e104]:
        - img "部件中心" [ref=e105]
        - paragraph [ref=e106]: 部件中心 — 生產分析（P）、品質分析（Q）、設備分析（M）三類 widget 可自由加入自訂看板
      - generic [ref=e107]:
        - img "Widget 設定 Drawer" [ref=e108]
        - paragraph [ref=e109]: 每個 widget 均可透過 Drawer 自訂顯示欄位
